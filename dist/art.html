    <main class="container py-4">
        <h2 class="courier-prime-regular">ArtWorks</h2>
        <div class="row art-list">
            <!-- Five identical sections -->
            <div class="col-md-4 mb-3">
                <figure class="card">
                    <img src="images/Kay Hwang 01.jpg" class="card-img-top" alt="art sample">
                    <figcaption class="card-body">
                        <h5 class="card-title">Isolated Imagination</h5>
                        <p class="card-text">This work is a tribute to my brother, the setting being the children's section at the library which is where he had his first job. I chose to represent him as the ocean, since while humans tend to fear the unknown, the ocean is widely accepted to be beautiful regardless of its mystery. In this same way, although there is much we do not know about Autism and the way my brother thinks, I wish to overcome fear and see him for the beautiful person he is..</p>
                    </figcaption>
                </figure>
            </div>

            <div class="col-md-4 mb-3">
                <figure class="card">
                    <img src="images/Kay Hwang 02.jpg" class="card-img-top" alt="art sample">
                    <figcaption class="card-body">
                        <h5 class="card-title">Hidden by the Wings</h5>
                        <p class="card-text">Mirroring the survival methods of butterflies in the wild, Hidden by the Wings is a depiction of myself in the act of a camouflage strategy known as "Masquerade". Using happy portraits of myself, I hide from the hungry gaze of nearby predators, shielding myself from judgment and protecting my vulnerable self.</p>
                    </figcaption>
                </figure>
            </div>

            <div class="col-md-4 mb-3">
                <figure class="card">
                    <img src="images/Kay Hwang 04.jpg" class="card-img-top" alt="art sample">
                    <figcaption class="card-body">
                        <h5 class="card-title">Blazing</h5>
                        <p class="card-text">A house burns silently in the night, attracting the judgmental glares of the neighboring houses scared of being caught in the fire. Reflecting the stigma of mental illnesses, this work illustrates the lack of empathy that plagues our society, causing individuals to suffer alone.</p>
                    </figcaption>
                </figure>
            </div>

            <div class="col-md-4 mb-3">
                <figure class="card">
                    <img src="images/Kay Hwang 03.jpg" class="card-img-top" alt="art sample">
                    <figcaption class="card-body">
                        <h5 class="card-title">Art Never Dies</h5>
                        <p class="card-text">As humans, we always contemplate our own mortality. Once you die, what is left of your life? As artists, though, we live forever through our work, painting ourselves back to life with every color and shape on the canvas.</p>
                    </figcaption>
                </figure>
            </div>
        </div>
